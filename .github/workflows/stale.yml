name: "Close Stale Issues and PRs"
on:
  schedule:
    - cron: "30 1 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "security,keep"
          exempt-pr-labels: "keep"
          stale-issue-message: |
            This issue has been marked as stale due to 60 days of inactivity.
            It will be closed in 14 days if no further activity occurs.
            Comment or remove the stale label to keep it open.
          stale-pr-message: |
            This PR has been marked as stale due to 60 days of inactivity.
            It will be closed in 14 days if no further activity occurs.
            Comment or remove the stale label to keep it open.
          close-issue-message: "Closed due to inactivity."
          close-pr-message: "Closed due to inactivity."
